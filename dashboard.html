<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FTC secure wallet</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#eef2f7;}
.dark { background:#121212; color:white;}

header, footer {background:#0a3d91;color:white;padding:15px;}
header img{height:40px;}

.menu { position:absolute; right:20px; top:15px;}
.dropdown {display:none; position:absolute; right:0; background:white; width:220px;}
..dropdown div {
  padding:10px;
  border-bottom:1px solid #ddd;
  cursor:pointer;
  color:black;
}

.container { padding:20px;}
.box {background:white; padding:20px; border-radius:10px; margin:15px 0;}
.dark .box {background:#1e1e1e;}

button {padding:10px; background:#0a3d91; color:white; border:none; cursor:pointer;}

#notif {position:fixed; top:20px; right:20px; background:green; color:white; padding:10px; display:none;}
.toggle {position:fixed; top:20px; left:20px; cursor:pointer;}

/* CARD */
.card {width:300px;height:180px;perspective:1000px;}
.card-inner {width:100%;height:100%;transition:0.6s;transform-style:preserve-3d;}
.card:hover .card-inner {transform:rotateY(180deg);}
.card-front,.card-back {
position:absolute;width:100%;height:100%;
backface-visibility:hidden;border-radius:10px;padding:20px;color:white;
}
.card-front {background:#0a3d91;}
.card-back {background:#222;transform:rotateY(180deg);}
</style>
</head>

<body>

<header>
<img src="125.png"> Federal Trade Commission

<div class="menu">
<button onclick="toggleMenu()">☰</button>
<div class="dropdown" id="menuBox">
<div onclick="openPage('profile')">👤 Profile</div>
<div onclick="openPage('checkings')">Checkings</div>
<div onclick="openPage('savings')">Savings</div>
<div onclick="openPage('investments')">Investments</div>
<div onclick="openPage('card')">Credit Card</div>
<div onclick="openPage('compensation')">compensation</div>
<div onclick="logout()">🚪 Sign Out</div>
</div>
</div>
</header>

<div class="toggle" onclick="toggleDark()">🌙</div>

<div class="container">

<div class="card">
<div class="card-inner">
<div class="card-front">
💳 Premium Card<br><br>
1200 3478 6766 7776
</div>
<div class="card-back">
CVV: 987<br>Exp: 12/28
</div>
</div>
</div>

<div class="box">
Account: 13007677876609
<h2 id="balance">$51,000.00</h2>
</div>

<div class="box">
<button onclick="toggleTx()">View Transactions</button>

<div id="tx" style="display:none;">
<select id="filter" onchange="filterTx()">
<option value="all">All</option>
<option value="deposit">Deposits</option>
<option value="comp">Compensation</option>
<option value="transfer">Transfers</option>
</select>

<input id="search" onkeyup="filterTx()" placeholder="Search...">
<button onclick="downloadTx()">📥 Download</button>

<div id="txList"></div>
</div>
</div>

<div class="box">
<canvas id="chart"></canvas>
</div>

<div class="box">
<button onclick="addFunds()">Add Funds</button>
<div id="fundFlow"></div>
</div>

<div class="box">
<button onclick="loadVideos()">Unlock Content</button>
<div id="videos"></div>
</div>

<div class="box">
<h3>Transfer Money</h3>
<button onclick="openTransfer()">Start Transfer</button>
<div id="transferFlow"></div>
</div>

<div class="box">
<h3>Blockchain Ledger</h3>
<div id="ledger" style="height:120px; overflow:auto;"></div>
</div>

</div>

<footer>Federal Trade commission secure wallet</footer>

<div id="notif">Success</div>

<script>

function toggleMenu(){
let m=document.getElementById("menuBox");
m.style.display=m.style.display==="block"?"none":"block";
}

function logout(){
window.location.href="index.html";
}

function openPage(page){
if(page==="compensation"){
window.location.href="compensation.html";
}else{
alert(page + " page opened");
}
}

function toggleDark(){document.body.classList.toggle("dark");}

let transactions=[
{type:"deposit",name:"Cash Deposit",date:"12-04-2026 04:59 PM",amount:50000},
{type:"comp",name:"Case Compensation",date:"11-04-2026 08:34 AM",amount:250},
{type:"comp",name:"Case Compensation",date:"04-04-2026 09:57 AM",amount:250},
{type:"comp",name:"Case Compensation",date:"28-03-2026 05:11 PM",amount:250},
{type:"comp",name:"Case Compensation",date:"21-03-2026 03:34 PM",amount:250}
];

function renderTx(list){
let html="";
list.forEach(t=>{
let color=t.amount<0?"red":"green";
let sign=t.amount<0?"-":"+";
html+=`<div style="display:flex;justify-content:space-between;padding:10px;">
<div>${t.name}<br><small>${t.date}</small></div>
<div style="color:${color};font-weight:bold;">${sign}$${Math.abs(t.amount)}</div>
</div><hr>`;
});
document.getElementById("txList").innerHTML=html;
}

function filterTx(){
let f=document.getElementById("filter").value;
let s=document.getElementById("search").value.toLowerCase();

let filtered=transactions.filter(t=>{
return (f==="all"||t.type===f) &&
(t.name.toLowerCase().includes(s)||t.date.includes(s));
});
renderTx(filtered);
}

function downloadTx(){
let content="";
transactions.forEach(t=>{
content+=`${t.name} ${t.date} ${t.amount}\n`;
});
let blob=new Blob([content]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="transactions.txt";
a.click();
}

function addFunds(){
document.getElementById("fundFlow").innerHTML=`
<select><option>$10,000</option><option>$50,000</option></select>
<button onclick="submitFunds()">Submit</button>
`;
}

function submitFunds(){
document.getElementById("notif").style.display="block";
setTimeout(()=>{document.getElementById("notif").style.display="none";},2000);
}

function loadVideos(){
let html="";
for(let i=1;i<=5;i++){
html+=`<button onclick="this.innerHTML='Available after 24h'">▶ Video ${i}</button><br>`;
}
document.getElementById("videos").innerHTML=html;
}

function openTransfer(){
document.getElementById("transferFlow").innerHTML=`
<input id="name" placeholder="Name"><br>
<input id="amount" type="number" placeholder="Amount"><br>
<input id="date" type="datetime-local"><br>
<button onclick="schedulePayment()">Schedule</button>
`;
}

function schedulePayment(){
let name=document.getElementById("name").value;
let amount=document.getElementById("amount").value;
let date=document.getElementById("date").value;

let delay=new Date(date)-new Date();

setTimeout(()=>{
transactions.unshift({
type:"transfer",
name:"Transfer to "+name,
date:new Date().toLocaleString(),
amount:-amount
});
renderTx(transactions);

let n=document.getElementById("notif");
n.style.display="block";
n.innerText="💸 Payment Sent!";
setTimeout(()=>n.style.display="none",3000);

},delay);

alert("Payment Scheduled");
}

new Chart(document.getElementById("chart"), {
type:'line',
data:{labels:["Jan","Feb","Mar"],datasets:[{data:[100,300,750]}]}
});

setInterval(()=>{
let l=document.getElementById("ledger");
l.innerHTML=`<p>$${Math.random()*1000|0}</p>`+l.innerHTML;
},2000);

function toggleTx(){
let t=document.getElementById("tx");
t.style.display=t.style.display==="none"?"block":"none";
}

renderTx(transactions);

</script>

</body>
</html>
