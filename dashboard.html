<script>

// MENU
function toggleMenu(){
let m=document.getElementById("menuBox");
m.style.display=m.style.display==="block"?"none":"block";
}

// 🔥 FIXED
function logout(){
window.location.href="index.html";
}

// DARK
function toggleDark(){document.body.classList.toggle("dark");}

// TRANSACTIONS
let transactions=[
{type:"deposit",name:"Cash Deposit",date:"12-04-2026 04:59 PM",amount:50000},
{type:"comp",name:"Case Compensation",date:"11-04-2026 08:34 AM",amount:250},
{type:"comp",name:"Case Compensation",date:"04-04-2026 09:57 AM",amount:250},
{type:"comp",name:"Case Compensation",date:"28-03-2026 05:11 PM",amount:250},
{type:"comp",name:"Case Compensation",date:"21-03-2026 03:34 PM",amount:250}
];

function renderTx(list){
let html="";
list.forEach(t=>{
let color=t.amount<0?"red":"green";
let sign=t.amount<0?"-":"+";
html+=`<div style="display:flex;justify-content:space-between;padding:10px;">
<div>${t.name}<br><small>${t.date}</small></div>
<div style="color:${color};font-weight:bold;">${sign}$${Math.abs(t.amount)}</div>
</div><hr>`;
});
document.getElementById("txList").innerHTML=html;
}

function filterTx(){
let f=document.getElementById("filter").value;
let s=document.getElementById("search").value.toLowerCase();

let filtered=transactions.filter(t=>{
return (f==="all"||t.type===f) &&
(t.name.toLowerCase().includes(s)||t.date.includes(s));
});
renderTx(filtered);
}

function downloadTx(){
let content="";
transactions.forEach(t=>{
content+=`${t.name} ${t.date} ${t.amount}\n`;
});
let blob=new Blob([content]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="transactions.txt";
a.click();
}

// ADD FUNDS
function addFunds(){
document.getElementById("fundFlow").innerHTML=`
<select><option>$10,000</option><option>$50,000</option></select>
<button onclick="submitFunds()">Submit</button>
`;
}

function submitFunds(){
document.getElementById("notif").style.display="block";
setTimeout(()=>{document.getElementById("notif").style.display="none";},2000);
}

// VIDEOS
function loadVideos(){
let html="";
for(let i=1;i<=5;i++){
html+=`<button onclick="this.innerHTML='Available after 24h'">▶ Video ${i}</button><br>`;
}
document.getElementById("videos").innerHTML=html;
}

// TRANSFER
function openTransfer(){
document.getElementById("transferFlow").innerHTML=`
<input id="name" placeholder="Name"><br>
<input id="amount" type="number" placeholder="Amount"><br>
<input id="date" type="datetime-local"><br>
<button onclick="schedulePayment()">Schedule</button>
`;
}

function schedulePayment(){
let name=document.getElementById("name").value;
let amount=document.getElementById("amount").value;
let date=document.getElementById("date").value;

let delay=new Date(date)-new Date();

setTimeout(()=>{
transactions.unshift({
type:"transfer",
name:"Transfer to "+name,
date:new Date().toLocaleString(),
amount:-amount
});
renderTx(transactions);

let n=document.getElementById("notif");
n.style.display="block";
n.innerText="💸 Payment Sent!";
setTimeout(()=>n.style.display="none",3000);

},delay);

alert("Payment Scheduled");
}

// CHART
new Chart(document.getElementById("chart"), {
type:'line',
data:{labels:["Jan","Feb","Mar"],datasets:[{data:[100,300,750]}]}
});

// LEDGER
setInterval(()=>{
let l=document.getElementById("ledger");
l.innerHTML=`<p>$${Math.random()*1000|0}</p>`+l.innerHTML;
},2000);

function toggleTx(){
let t=document.getElementById("tx");
t.style.display=t.style.display==="none"?"block":"none";
}

renderTx(transactions);
renderTx(transactions);

// 🔥 FIXED FUNCTION
function openPage(page){

if(page==="compensation"){
window.location.href="compensation.html";
}
else{
alert(page + " page opened");
}

}

</script>
